<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background: #f5f3ee; color: #111111; }
.app { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; height: 100vh; height: 100dvh; }
header { background: #2d6a4f; color: #fff; padding: 11px 16px; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.25); }

.layout { display: -webkit-flex; display: flex; -webkit-flex: 1; flex: 1; overflow: hidden; min-height: 0; }
.sidebar { width: 280px; flex-shrink: 0; background: #ffffff; border-right: 1px solid #d0cbc0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.sb-title { padding: 9px 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #111111; background: #f0ece3; border-bottom: 1px solid #d0cbc0; position: -webkit-sticky; position: sticky; top: 0; z-index: 5; }
.day-group { border-bottom: 1px solid #e4dfd4; }
.day-hdr { padding: 8px 12px; background: #f7f4ee; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 10px; border-bottom: 1px solid #e4dfd4; }
.day-badge { width: 26px; height: 26px; border-radius: 50%; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.day-date  { font-size: 12px; font-weight: 700; color: #111111; line-height: 1.2; }
.day-theme { font-size: 11px; color: #3d3a33; font-style: italic; margin-top: 1px; }
.stop-list { padding: 8px 10px; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 5px; }
.stop-item { display: -webkit-flex; display: flex; -webkit-align-items: flex-start; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; border: 1.5px solid #ede9e1; background: #faf8f4; -webkit-tap-highlight-color: rgba(0,0,0,0.08); }
.stop-item.active { background: #e8f0ff; border-color: #4a6fa5; }
.stop-num { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; margin-top: 1px; }
.stop-info { flex: 1; min-width: 0; }
.stop-name { font-size: 13px; font-weight: 700; color: #111111; line-height: 1.3; }
.stop-time { font-size: 11px; color: #3d3a33; margin-top: 2px; }
.stop-drv  { font-size: 11px; font-weight: 600; margin-top: 3px; }
#map { -webkit-flex: 1; flex: 1; min-width: 0; }
/* Legend */
.legend { padding: 6px 14px; background: #f7f4ee; border-top: 1px solid #d0cbc0; display: -webkit-flex; display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; flex-shrink: 0; }
.leg-item { display: -webkit-flex; display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: #111111; font-weight: 500; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
/* Popup */
.rp .leaflet-popup-content-wrapper { border-radius: 14px; padding: 0; overflow: hidden; box-shadow: 0 10px 36px rgba(0,0,0,0.22); max-width: 290px; min-width: 270px; }
.rp .leaflet-popup-content { margin: 0; }
.rp .leaflet-popup-close-button { color: #fff !important; font-size: 18px !important; top: 6px !important; right: 8px !important; text-shadow: 0 1px 3px rgba(0,0,0,0.5); z-index: 10; }
.pop-hero { font-size: 40px; text-align: center; padding: 14px 0 10px; background: #e8f4ef; min-height: 50px; }
.pop-hero img { width: 100%; height: 130px; object-fit: cover; display: block; margin-bottom: -4px; }
.hero-emoji { display: inline-block; }
.pop-body { padding: 11px 13px 7px; }
.pop-day   { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; opacity: 0.75; }
.pop-name  { font-size: 15px; font-weight: 700; line-height: 1.25; margin-bottom: 5px; color: #111111; }
.pop-detail{ font-size: 12px; color: #444; line-height: 1.55; }
.pop-tips  { padding: 8px 13px; border-top: 1px solid #f0ece4; }
.pop-tip   { font-size: 11.5px; color: #1b3a2e; line-height: 1.5; padding: 3px 0; display: -webkit-flex; display: flex; gap: 6px; }
.pop-tip-check { font-weight: 700; flex-shrink: 0; }
.pop-ft { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; padding: 8px 13px 12px; border-top: 1px solid #f0ece4; gap: 8px; }
.pop-drv  { font-size: 11px; font-weight: 600; }
.pop-link { color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-decoration: none; white-space: nowrap; flex-shrink: 0; }
.pop-wx { background: #f0f7f4; border-top: 1px solid #d8ede4; padding: 8px 13px 10px; }
.pop-wx-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #2d6a4f; margin-bottom: 7px; }
.pop-wx-note { font-size: 9px; font-weight: 400; color: #888; text-transform: none; margin-left: 4px; letter-spacing: 0; }
.pop-wx-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 7px; }
.pop-wx-item { background: #fff; border-radius: 6px; padding: 5px 3px 4px; text-align: center; border: 1px solid #d0e8dc; }
.pop-wx-val { display: block; font-size: 11px; font-weight: 700; color: #1b4332; line-height: 1.2; }

var sb = document.getElementById('sidebar');
DAYS.forEach(function(day, di) {
  var grp = document.createElement('div');
  grp.className = 'day-group';
  var h = '<div class="day-hdr">' +
    '<div class="day-badge" style="background:' + day.color + '">' + (di+1) + '</div>' +
    '<div><div class="day-date">' + day.date + '</div><div class="day-theme">' + day.theme + '</div></div>' +
    '</div><div class="stop-list">';
  day.stops.forEach(function(stop, si) {
    var sc = stop.stopColor || day.color;
    h += '<div class="stop-item" data-di="' + di + '" data-si="' + si + '">' +
      '<div class="stop-num" style="background:' + sc + '">' + (si+1) + '</div>' +
      '<div class="stop-info">' +
        '<div class="stop-name">' + stop.name + '</div>' +
        '<div class="stop-time">' + stop.time + '</div>' +
        '<div class="stop-drv" style="color:' + sc + '">&#128663; ' + stop.drive + ' &middot; ' + stop.dist + '</div>' +
      '</div></div>';
  });
  h += '</div>';
  grp.innerHTML = h;
  sb.appendChild(grp);
});

sb.addEventListener('click', function(e) {
  var el = e.target;
  while (el && !el.classList.contains('stop-item')) el = el.parentElement;

});

    '<text x="19" y="22.5" text-anchor="middle" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="bold" fill="' + color + '">' + n + '</text>' +
    '</svg>';
  return L.divIcon({ html: s, className: '', iconSize: [38,48], iconAnchor: [19,48], popupAnchor: [0,-52] });
}

var markers = [];
var allLL = [];
var n = 1;

DAYS.forEach(function(day, di) {
  var dayLL = day.stops.map(function(s){ return [s.lat, s.lng]; });
  allLL = allLL.concat(dayLL);
  if (dayLL.length > 1) {
    L.polyline(dayLL, {color: day.color, weight: 2.5, opacity: 0.6, dashArray: '6,5'}).addTo(map);
  }
  day.stops.forEach(function(stop, si) {
    var sc = stop.stopColor || day.color;
    var tipHtml = '';
    if (stop.tips) {
      stop.tips.forEach(function(t) {
        tipHtml += '<div class="pop-tip"><span class="pop-tip-check" style="color:' + sc + '">&#10003;</span><span>' + t + '</span></div>';
      });
    }
    var linkHtml = stop.website ? '<a class="pop-link" style="background:' + sc + '" href="' + stop.website + '" target="_blank">&#128205; ' + stop.wlabel + '</a>' : '';
    var photoHtml = stop.photo
      ? '<div class="pop-hero" data-photo="' + stop.photo + '" style="background:#e8f4ef"><span class="hero-emoji">' + (stop.emoji || '&#127956;') + '</span></div>'
      : '<div class="pop-hero" style="background:#e8f4ef"><span class="hero-emoji">' + (stop.emoji || '&#127956;') + '</span></div>';
    var wxHtml = '';
    if (stop.weather) {
      var wx = stop.weather;
      wxHtml = '<div class="pop-wx">' +
        '<div class="pop-wx-title">&#127773; Avg July Weather <span class="pop-wx-note">historical</span></div>' +
        '<div class="pop-wx-grid">' +
          '<div class="pop-wx-item"><span class="pop-wx-val">' + wx.high + '</span><span class="pop-wx-lbl">High</span></div>' +
          '<div class="pop-wx-item"><span class="pop-wx-val">' + wx.low + '</span><span class="pop-wx-lbl">Low</span></div>' +
          '<div class="pop-wx-item"><span class="pop-wx-val">' + wx.rain + '</span><span class="pop-wx-lbl">Rain chance</span></div>' +
          '<div class="pop-wx-item"><span class="pop-wx-val">&#127774; ' + wx.uv + '</span><span class="pop-wx-lbl">UV Index</span></div>' +
        '</div>' +
        '<div class="pop-wx-best">&#9200; Best time: <b>' + wx.best + '</b></div>' +
        '<div class="pop-wx-desc">' + wx.note + '</div>' +
      '</div>';
    }
    var popup =
      photoHtml +
      '<div class="pop-body">' +
        '<div class="pop-day" style="color:' + sc + '">' + day.date + ' &middot; ' + day.theme + '</div>' +
        '<div class="pop-name">' + stop.name + '</div>' +
        '<div class="pop-detail">' + stop.detail + '</div>' +
      '</div>' +
      '<div class="pop-tips">' + tipHtml + '</div>' +
      wxHtml +
      '<div class="pop-ft"><span class="pop-drv" style="color:' + sc + '">&#128663; ' + stop.drive + ' &middot; ' + stop.dist + '</span>' + linkHtml + '</div>';
    var m = L.marker([stop.lat, stop.lng], {icon: mkIcon(sc, n)})
      .addTo(map)
      .bindPopup(popup, {className: 'rp', maxWidth: 300, autoPan: true});
    m.on('click', function(){ highlight(di, si); });
    markers.push({m: m, di: di, si: si, stop: stop});
    n++;
  });
});

L.polyline(allLL, {color:'#bbb', weight:1, opacity:0.22, dashArray:'3,10'}).addTo(map);
map.fitBounds(L.latLngBounds(allLL), {padding:[32,32]});

function fly(di, si) {
  for (var i = 0; i < markers.length; i++) {
    if (markers[i].di === di && markers[i].si === si) {
      var e = markers[i];
      map.flyTo([e.stop.lat, e.stop.lng], 14, {duration: 0.9});
      setTimeout(function(){ e.m.openPopup(); }, 1000);
      highlight(di, si);
      return;
    }
  }
}

function highlight(di, si) {
  var items = document.querySelectorAll('.stop-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.querySelector('.stop-item[data-di="' + di + '"][data-si="' + si + '"]');
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth', block:'nearest'}); }
}

map.on('popupopen', function(e) {
  var popupEl = e.popup.getElement();
  if (!popupEl) return;
  var hero = popupEl.querySelector('.pop-hero');
  if (!hero || !hero.getAttribute('data-photo')) return;
  var url = hero.getAttribute('data-photo');
  if (!url || hero.querySelector('img')) return;
  var img = new Image();
  img.onload = function() {
    var imgEl = document.createElement('img');
    imgEl.src = url;
    hero.insertBefore(imgEl, hero.firstChild);
    var em = hero.querySelector('.hero-emoji');
    if (em) em.style.display = 'none';
    hero.style.padding = '0';
    hero.style.background = 'none';
  };
  img.src = url;
});
</script>
</body>
</html>
